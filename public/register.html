<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Register</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <!-- ============================================= -->
  <!-- TOP NAV                                       -->
  <!-- ============================================= -->
  <div class="topbar">
    <div class="topbarInner">
      <a class="brand" href="/"><span class="logoDot"></span>DriveShare</a>
      <div class="navLinks">
        <a href="/renter.html">Search</a>
        <a href="/owner.html">Owner</a>
        <a href="/notifications.html">Notifications</a>
      </div>
    </div>
  </div>

  <main class="wrap">
    <!-- ============================================= -->
    <!-- REGISTRATION FORM                             -->
    <!-- ============================================= -->
    <div class="card section">
      <h1 class="pageTitle">Register</h1>
      <div class="sub">Create an account and set 3 security questions.</div>

      <div class="row mt14">
        <input class="input" id="display" placeholder="display name" />
        <input class="input" id="email" placeholder="email" />
        <input class="input" id="pw" placeholder="password" type="password" />
      </div>

      <div class="card section mt14 noShadow">
        <div class="fw950">Security questions</div>
        <div class="sub mt6">Used for password recovery (CoR).</div>

        <div class="row mt12">
          <input class="input flex1Min260" id="q1" placeholder="Question 1" />
          <input class="input flex1Min200" id="a1" placeholder="Answer 1" />
        </div>

        <div class="row mt10">
          <input class="input flex1Min260" id="q2" placeholder="Question 2" />
          <input class="input flex1Min200" id="a2" placeholder="Answer 2" />
        </div>

        <div class="row mt10">
          <input class="input flex1Min260" id="q3" placeholder="Question 3" />
          <input class="input flex1Min200" id="a3" placeholder="Answer 3" />
        </div>

        <div class="row mt12">
          <button class="btn" id="regBtn">Create account</button>
          <a class="btnOutline btnLink" href="/login.html">Already have an account?</a>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    /*
     * Author:
     * Created on: January 11, 2026
     * Last updated: April 12, 2026
     * Purpose: Sends the registration payload to the auth endpoint.
     */

    // =============================================
    // IMPORTS
    // =============================================

    import { apiPost, showToast } from "./ui.js";

    // =============================================
    // EVENTS
    // =============================================

    document.getElementById('regBtn').addEventListener('click', async () => {
      const payload = {
        displayName: display.value,
        email: email.value,
        password: pw.value,
        questions: [
          {question: q1.value, answer: a1.value},
          {question: q2.value, answer: a2.value},
          {question: q3.value, answer: a3.value},
        ]
      };

      const r = await apiPost('/api/auth/register', payload);
      if(r.ok){
        showToast('Account created', 'You can login now');
      } else {
        showToast('Register failed', r.error || 'Check fields');
      }
    });
  </script>
</body>
</html>
