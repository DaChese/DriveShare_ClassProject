<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Search - DriveShare</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <a class="brand" href="/"><span class="logoDot"></span>DriveShare</a>
      <div class="navLinks">
        <a href="/owner.html">Owner</a>
        <a href="/notifications.html">Notifications</a>
        <a href="/messages.html">Messages</a>
      </div>
    </div>
  </div>

  <main class="wrap">
    <div class="card section">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <div>
          <h1 style="font-size:22px;font-weight:950;">Search</h1>
          <div class="sub">Location + dates are required. Max price is optional.</div>
        </div>
        <div class="pill" id="mePill">Not logged in</div>
      </div>

      <div class="searchBar searchBarWide" style="margin-top:14px">
        <input class="input" id="location" placeholder="Pickup location" />
        <input class="input" id="start" type="date" />
        <input class="input" id="end" type="date" />

        <div class="rangeWrap">
          <input class="range" id="maxPrice" type="range" min="20" max="300" step="5" value="300" />
          <input class="input" id="maxPriceNum" type="number" min="20" max="300" step="5" placeholder="Any" style="width:110px" />
          <div class="pill" id="maxPriceText">Any price</div>
        </div>

        <button class="btn" id="searchBtn">Search</button>
      </div>
    </div>

    <div class="resultsLayout">
      <aside class="card section sidebar">
        <h3>Filters</h3>

        <div class="field">
          <div class="label">Sort</div>
          <select class="select" id="sort">
            <option value="priceAsc">Price: low to high</option>
            <option value="priceDesc">Price: high to low</option>
            <option value="mileageAsc">Mileage: low to high</option>
            <option value="yearDesc">Year: newest first</option>
          </select>
        </div>

        <div class="field">
          <div class="label">Quick actions</div>
          <div class="row" style="margin-top:8px">
            <a class="btnOutline" href="/login.html" style="text-decoration:none;display:inline-flex;align-items:center;">Login</a>
            <a class="btnOutline" href="/register.html" style="text-decoration:none;display:inline-flex;align-items:center;">Register</a>
          </div>
        </div>

        <div class="field">
          <div class="label">Tip</div>
          <div class="sub">Click any card to open the car details page.</div>
        </div>
      </aside>

      <section>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div class="sub" id="countText">0 cars</div>
        </div>

        <div id="resultsGrid" class="gridCars"></div>
      </section>
    </div>
  </main>

  <script type="module">
    import {
      apiGet, money, daysBetween,
      readQueryParams, setQueryParams, showToast,
      todayISO, addDaysISO,
      getUnsplashPhotoForCar
    } from "./ui.js";

    class SearchMediator{
      constructor(){
        this.locEl = document.getElementById('location');
        this.startEl = document.getElementById('start');
        this.endEl = document.getElementById('end');

        this.maxEl = document.getElementById('maxPrice');
        this.maxNumEl = document.getElementById('maxPriceNum');
        this.maxText = document.getElementById('maxPriceText');

        this.searchBtn = document.getElementById('searchBtn');

        this.sortEl = document.getElementById('sort');
        this.grid = document.getElementById('resultsGrid');
        this.countText = document.getElementById('countText');
        this.mePill = document.getElementById('mePill');

        this.lastCars = [];

        this.searchBtn.addEventListener('click', ()=> this.search(true));
        this.sortEl.addEventListener('change', ()=> this.render());

        this.maxEl.addEventListener('input', ()=> this.setFromRange());
        this.maxNumEl.addEventListener('input', ()=> this.setFromNumber());
        this.startEl.addEventListener('change', ()=> this.syncEndMin());
      }

      setFromRange(){
        const v = Number(this.maxEl.value);
        const max = Number(this.maxEl.max);

        if(v >= max){
          this.maxNumEl.value = "";
          this.maxText.textContent = "Any price";
        }else{
          this.maxNumEl.value = String(v);
          this.maxText.textContent = `Max $${v}/day`;
        }
      }

      setFromNumber(){
        const raw = this.maxNumEl.value.trim();
        const max = Number(this.maxEl.max);

        if(raw === ""){
          this.maxEl.value = String(max);
          this.maxText.textContent = "Any price";
          return;
        }

        let v = Number(raw);
        if(!Number.isFinite(v)) v = max;
        v = Math.max(Number(this.maxEl.min), Math.min(max, v));

        this.maxEl.value = String(v);

        if(v >= max){
          this.maxNumEl.value = "";
          this.maxText.textContent = "Any price";
        }else{
          this.maxText.textContent = `Max $${v}/day`;
        }
      }

      getMaxPriceParam(){
        const raw = this.maxNumEl.value.trim();
        if(raw === "") return "";
        const v = Number(raw);
        if(!Number.isFinite(v)) return "";
        if(v >= Number(this.maxEl.max)) return "";
        return String(v);
      }

      syncEndMin(){
        const s = this.startEl.value;
        if(s) this.endEl.min = s;
        if(this.endEl.value && this.endEl.value < this.endEl.min){
          this.endEl.value = this.endEl.min;
        }
      }

      async initFromQuery(){
        const q = readQueryParams();
        this.locEl.value = q.location || '';

        // default dates so users don’t have to type
        const t = todayISO();
        this.startEl.min = t;
        this.endEl.min = t;

        this.startEl.value = q.start || addDaysISO(t, 1);
        this.endEl.value = q.end || addDaysISO(this.startEl.value, 2);
        this.syncEndMin();

        if(q.maxPrice){
          const v = Math.max(Number(this.maxEl.min), Math.min(Number(this.maxEl.max), Number(q.maxPrice)));
          if(Number.isFinite(v)){
            this.maxEl.value = String(v);
            this.maxNumEl.value = String(v);
          }
        }else{
          this.maxEl.value = String(this.maxEl.max);
          this.maxNumEl.value = "";
        }
        this.setFromRange();

        const me = await apiGet('/api/auth/me');
        this.mePill.textContent = me.ok ? ('Logged in: ' + me.user.display_name) : 'Not logged in';

        if(this.locEl.value){
          await this.search(false);
        }
      }

      sortCars(){
        const v = this.sortEl.value;
        const out = [...this.lastCars];
        if(v === 'priceAsc') out.sort((a,b)=>a.price_per_day_cents-b.price_per_day_cents);
        if(v === 'priceDesc') out.sort((a,b)=>b.price_per_day_cents-a.price_per_day_cents);
        if(v === 'mileageAsc') out.sort((a,b)=>a.mileage-b.mileage);
        if(v === 'yearDesc') out.sort((a,b)=>b.year-a.year);
        return out;
      }

      render(){
        const cars = this.sortCars();
        this.grid.innerHTML = '';
        this.countText.textContent = cars.length + (cars.length === 1 ? ' car' : ' cars');

        if(!cars.length){
          this.grid.innerHTML = '<div class="sub">No cars found for that search.</div>';
          return;
        }

        const s = this.startEl.value.trim();
        const e = this.endEl.value.trim();

        for(const c of cars){
          const d = (s && e) ? daysBetween(s,e) : 1;
          const estTotal = d * Number(c.price_per_day_cents);

          const card = document.createElement('div');
          card.className = 'card carCard clickCard';

          card.innerHTML = `
            <div class="carImg">
              <img class="photo" alt="${c.year} ${c.make} ${c.model}"
                src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" />
              <div class="imgCredit" id="credit-${c.id}"></div>
            </div>

            <div class="carBody">
              <div class="carTitle">${c.year} ${c.make} ${c.model}</div>
              <div class="carMeta">${c.pickup_location} • ${c.mileage} miles</div>

              <div class="carBottom">
                <div>
                  <div class="price">${money(c.price_per_day_cents)}/day</div>
                  <div class="sub">${money(estTotal)} total</div>
                </div>
                <a class="smallLink" href="/car.html?id=${c.id}&start=${encodeURIComponent(s)}&end=${encodeURIComponent(e)}">View</a>
              </div>
            </div>
          `;

          card.addEventListener('click', (ev) => {
            if(ev.target.closest('a')) return;
            location.href = `/car.html?id=${c.id}&start=${encodeURIComponent(s)}&end=${encodeURIComponent(e)}`;
          });

          this.grid.appendChild(card);

          const img = card.querySelector("img.photo");
          const credit = card.querySelector(`#credit-${c.id}`);

          getUnsplashPhotoForCar(c).then((photo) => {
            if(!photo || !photo.small) return;

            img.src = photo.small;
            img.onload = () => img.classList.add("isLoaded");

            credit.innerHTML =
              `Photo by <a href="${photo.photographerLink}" target="_blank" rel="noreferrer">${photo.photographerName}</a>
               on <a href="${photo.unsplashLink}" target="_blank" rel="noreferrer">Unsplash</a>`;
          }).catch(()=>{});
        }
      }

      async search(pushUrl=true){
        const loc = this.locEl.value.trim();
        const start = this.startEl.value.trim();
        const end = this.endEl.value.trim();
        const maxPriceParam = this.getMaxPriceParam();

        if(!loc || !start || !end){
          showToast('Missing search fields', 'Location, start, and end are required');
          return;
        }

        if(pushUrl){
          history.replaceState({}, '', setQueryParams('/renter.html', {
            location: loc, start, end, maxPrice: maxPriceParam
          }));
        }

        const params = new URLSearchParams({ location: loc, start, end });
        if(maxPriceParam) params.set('maxPrice', maxPriceParam);

        const r = await apiGet('/api/cars/search?' + params.toString());
        if(!r.ok){
          this.lastCars = [];
          this.render();
          showToast('Search error', r.error || 'Try again');
          return;
        }

        this.lastCars = r.cars || [];
        this.render();
      }
    }

    const ui = new SearchMediator();
    ui.initFromQuery();
  </script>
</body>
</html>
