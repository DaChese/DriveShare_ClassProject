<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Search - DriveShare</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <a class="brand" href="/"><span class="logoDot"></span>DriveShare</a>
      <div class="navLinks">
        <a href="/owner.html">Owner</a>
        <a href="/notifications.html">Notifications</a>
        <a href="/messages.html">Messages</a>
        <a href="/history.html">History</a>
      </div>
    </div>
  </div>

  <main class="wrap">
    <div class="card section">
      <div class="flexBetweenTopWrap">
        <div>
          <h1 class="pageTitle">Search</h1>
          <div class="sub">Browse the full selection, or add location and dates to filter availability.</div>
        </div>
        <div class="pill" id="mePill">Not logged in</div>
      </div>

      <div class="searchBar searchBarWide mt14">
        <input class="input" id="location" placeholder="Pickup location" />
        <input class="input" id="start" type="date" />
        <input class="input" id="end" type="date" />

        <div class="rangeWrap">
          <input class="range" id="maxPrice" type="range" min="0" max="301" step="1" value="301" />
          <input class="input w110" id="maxPriceNum" type="number" min="0" max="300" step="1" placeholder="Any" />
          <div class="pill" id="maxPriceText">Any price</div>
        </div>

        <button class="btn" id="searchBtn">Search</button>
      </div>
    </div>

    <div class="resultsLayout">
      <aside class="card section sidebar">
        <h3>Filters</h3>

        <div class="field">
          <div class="label">Sort</div>
          <select class="select" id="sort">
            <option value="priceAsc">Price: low to high</option>
            <option value="priceDesc">Price: high to low</option>
            <option value="mileageAsc">Mileage: low to high</option>
            <option value="yearDesc">Year: newest first</option>
          </select>
        </div>

        <div class="field">
          <div class="label">Quick actions</div>
          <div class="row mt8">
            <a class="btnOutline btnLink" href="/login.html">Login</a>
            <a class="btnOutline btnLink" href="/register.html">Register</a>
          </div>
        </div>

        <div class="field">
          <div class="label">Tip</div>
          <div class="sub" id="tipText">Leave the fields open if you just want to browse everything.</div>
        </div>
      </aside>

      <section>
        <div class="flexBetweenWrap mb10">
          <div class="sub" id="countText">0 cars</div>
        </div>

        <div id="resultsGrid" class="gridCars"></div>
      </section>
    </div>
  </main>

  <script type="module">
    import {
      apiGet, money, daysBetween,
      readQueryParams, setQueryParams, showToast,
      todayISO, addDaysISO,
      getUnsplashPhotoForCar
    } from "./ui.js";

    class SearchMediator{
      constructor(){
        this.locEl = document.getElementById('location');
        this.startEl = document.getElementById('start');
        this.endEl = document.getElementById('end');

        this.maxEl = document.getElementById('maxPrice');
        this.maxNumEl = document.getElementById('maxPriceNum');
        this.maxText = document.getElementById('maxPriceText');

        this.searchBtn = document.getElementById('searchBtn');

        this.sortEl = document.getElementById('sort');
        this.grid = document.getElementById('resultsGrid');
        this.countText = document.getElementById('countText');
        this.mePill = document.getElementById('mePill');
        this.tipText = document.getElementById('tipText');

        this.lastCars = [];

        this.searchBtn.addEventListener('click', ()=> this.search(true));
        this.sortEl.addEventListener('change', ()=> this.render());

        this.maxEl.addEventListener('input', ()=> this.setFromRange());
        this.maxNumEl.addEventListener('input', ()=> this.setFromNumber());
        this.startEl.addEventListener('change', ()=> this.syncEndMin());
      }

      priceBounds(){
        const min = Number(this.maxEl.min);
        const anyValue = Number(this.maxEl.max);
        return { min, anyValue, numericMax: anyValue - 1 };
      }

      clampPriceValue(raw){
        const { min, numericMax } = this.priceBounds();
        const text = String(raw ?? '').trim();
        if(text === '') return null;
        const n = Number(text);
        if(!Number.isFinite(n) || Number.isNaN(n)) return null;
        return Math.min(numericMax, Math.max(min, Math.round(n)));
      }

      setPriceValue(value){
        const { anyValue } = this.priceBounds();

        if(value == null){
          this.maxEl.value = String(anyValue);
          this.maxNumEl.value = '';
          this.maxText.textContent = 'Any price';
          return;
        }

        const safe = this.clampPriceValue(value);
        this.maxEl.value = String(safe);
        this.maxNumEl.value = String(safe);
        this.maxText.textContent = `Up to $${safe}`;
      }

      setFromRange(){
        const { anyValue } = this.priceBounds();
        const v = Number(this.maxEl.value);
        this.setPriceValue(v >= anyValue ? null : v);
      }

      setFromNumber(){
        const raw = String(this.maxNumEl.value || '').trim();
        this.setPriceValue(raw === '' ? null : raw);
      }

      maxPriceOrNull(){
        return this.clampPriceValue(this.maxNumEl.value);
      }

      syncEndMin(){
        if(!this.startEl.value) return;
        this.endEl.min = addDaysISO(this.startEl.value, 1);
        if(this.endEl.value && this.endEl.value <= this.startEl.value){
          this.endEl.value = this.endEl.min;
        }
      }

      setDefaults(){
        const t = todayISO();
        const s = addDaysISO(t, 1);
        const e = addDaysISO(s, 3);

        if(!this.startEl.value) this.startEl.value = s;
        if(!this.endEl.value) this.endEl.value = e;

        this.syncEndMin();
        this.setPriceValue(null);
      }

      async loadMe(){
        const me = await apiGet('/api/auth/me');
        this.mePill.textContent = me.ok ? ('Logged in: ' + me.user.display_name) : 'Not logged in';
      }

      cardHtml(car, photo = null, days){
        const title = `${car.year} ${car.make} ${car.model}`;
        const meta = `${car.pickup_location} - ${car.mileage} miles`;
        const price = `${money(car.price_per_day_cents)}/day`;
        const total = `${money(car.price_per_day_cents * days)}`;

        const photoHtml = photo ? `
          <img class="photo isLoaded" src="${photo.regular}" alt="${title}"/>
          <div class="imgCredit">
            Photo by <a href="${photo.photographerLink}" target="_blank" rel="noreferrer">${photo.photographerName}</a> on
            <a href="${photo.unsplashLink}" target="_blank" rel="noreferrer">Unsplash</a>
          </div>
        ` : `<span data-photo-slot="${car.id}">Car</span>`;

        return `
          <div class="card carCard clickCard" data-id="${car.id}">
            <div class="carImg">${photoHtml}</div>
            <div class="carBody">
              <div class="carTitle">${title}</div>
              <div class="carMeta">${meta}</div>

              <div class="badgeRow">
                <div class="badgeSm">${price}</div>
                <div class="badgeSm">${days} day${days === 1 ? '' : 's'}</div>
                <div class="badgeSm">Total: ${total}</div>
              </div>

              <div class="carBottom">
                <div class="sub">Car #${car.id}</div>
                <div class="rightActions">
                  <a class="smallLink" href="/car.html?id=${car.id}">View</a>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      async hydratePhotos(cars, days){
        for (const car of cars.slice(0, 24)) {
          const photo = await getUnsplashPhotoForCar(car).catch(() => null);
          if (!photo?.regular) continue;

          const card = this.grid.querySelector(`.clickCard[data-id="${car.id}"] .carImg`);
          if (!card) continue;

          card.innerHTML = `
            <img class="photo isLoaded" src="${photo.regular}" alt="${car.year} ${car.make} ${car.model}"/>
            <div class="imgCredit">
              Photo by <a href="${photo.photographerLink}" target="_blank" rel="noreferrer">${photo.photographerName}</a> on
              <a href="${photo.unsplashLink}" target="_blank" rel="noreferrer">Unsplash</a>
            </div>
          `;
        }
      }

      sortCars(cars){
        const mode = this.sortEl.value;

        const sorted = [...cars];
        if(mode === 'priceAsc') sorted.sort((a,b)=>a.price_per_day_cents - b.price_per_day_cents);
        if(mode === 'priceDesc') sorted.sort((a,b)=>b.price_per_day_cents - a.price_per_day_cents);
        if(mode === 'mileageAsc') sorted.sort((a,b)=>a.mileage - b.mileage);
        if(mode === 'yearDesc') sorted.sort((a,b)=>b.year - a.year);

        return sorted;
      }

      updateUrl(){
        const max = this.maxPriceOrNull();
        const href = setQueryParams('/renter.html', {
          location: this.locEl.value.trim(),
          start: this.startEl.value,
          end: this.endEl.value,
          maxPrice: max == null ? '' : max
        });
        history.replaceState(null, '', href);
      }

      async search(updateUrl){
        const loc = this.locEl.value.trim();
        const start = this.startEl.value;
        const end = this.endEl.value;
        const max = this.maxPriceOrNull();
        const useSearch = Boolean(loc && start && end);

        if(updateUrl) this.updateUrl();

        const url = useSearch
          ? '/api/cars/search?location=' + encodeURIComponent(loc) +
            '&start=' + encodeURIComponent(start) +
            '&end=' + encodeURIComponent(end) +
            (max == null ? '' : ('&maxPrice=' + encodeURIComponent(max)))
          : '/api/cars/browse?limit=500' +
            (loc ? ('&location=' + encodeURIComponent(loc)) : '') +
            (max == null ? '' : ('&maxPrice=' + encodeURIComponent(max)));

        const r = await apiGet(url);
        if(!r.ok){
          showToast(useSearch ? 'Search failed' : 'Browse failed', r.error || 'Try again');
          this.lastCars = [];
          this.render();
          return;
        }

        this.lastCars = r.cars || [];
        this.tipText.textContent = useSearch
          ? 'Showing filtered availability for your trip.'
          : 'Showing the full selection. Add location and dates to filter availability.';
        this.render();
      }

      async render(){
        const cars = this.sortCars(this.lastCars);
        this.grid.innerHTML = '';

        this.countText.textContent = `${cars.length} car${cars.length === 1 ? '' : 's'}`;

        if(!cars.length){
          this.grid.innerHTML = '<div class="sub">No cars found.</div>';
          return;
        }

        const hasTripDates = Boolean(this.startEl.value && this.endEl.value);
        const days = hasTripDates ? Math.max(1, daysBetween(this.startEl.value, this.endEl.value)) : 1;
        this.grid.innerHTML = cars.map((c)=> this.cardHtml(c, null, days)).join('');

        this.grid.querySelectorAll('.clickCard').forEach(el=>{
          el.addEventListener('click', (e)=>{
            const a = e.target.closest('a');
            if(a) return;
            location.href = '/car.html?id=' + encodeURIComponent(el.dataset.id);
          });
        });

        this.hydratePhotos(cars, days);
      }

      initFromQuery(){
        const p = readQueryParams();
        if(p.location) this.locEl.value = p.location;
        if(p.start) this.startEl.value = p.start;
        if(p.end) this.endEl.value = p.end;

        if(p.maxPrice){
          this.maxNumEl.value = p.maxPrice;
          this.setFromNumber();
        } else {
          this.setPriceValue(null);
        }

        this.syncEndMin();
      }
    }

    const m = new SearchMediator();
    m.setDefaults();
    m.initFromQuery();
    await m.loadMe();
    m.search(false);
  </script>
</body>
</html>
