  Purpose: Shows renter and owner booking history with actions for each booking.

<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>History - DriveShare</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <!-- ============================================= -->
  <!-- TOP NAV                                       -->
  <!-- ============================================= -->
  <div class="topbar">
    <div class="topbarInner">
      <a class="brand" href="/"><span class="logoDot"></span>DriveShare</a>
      <div class="navLinks">
        <a href="/renter.html">Search</a>
        <a href="/owner.html">Owner</a>
        <a href="/notifications.html">Notifications</a>
        <a href="/messages.html">Messages</a>
        <a href="/history.html">History</a>
      </div>
    </div>
  </div>

  <main class="wrap">
    <!-- ============================================= -->
    <!-- HISTORY PANEL                                 -->
    <!-- ============================================= -->
    <div class="card section">
      <div class="flexBetweenTopWrap">
        <div>
          <h1 class="pageTitle">Rental History</h1>
          <div class="sub">See past booking activity as renter and owner. Leave feedback, message the other person, or cancel active bookings here.</div>
        </div>
        <div class="pill" id="mePill">Checking login...</div>
      </div>

      <div id="historyContainer" class="mt14"></div>
    </div>
  </main>

<script type="module">
import { apiGet, apiPost, money, showToast } from "./ui.js";

// =============================================
// DOM
// =============================================

const historyContainer = document.getElementById('historyContainer');
const mePill = document.getElementById('mePill');

// =============================================
// RENDER HELPERS
// =============================================

function renderReviewForm(booking) {
  return `
    <div class="card section mt10 noShadow">
      <div class="flexBetweenTopWrap">
        <div class="fw950">Leave a review</div>
        <div class="pill">Rating 1-5</div>
      </div>
      <div class="row mt12">
        <input class="input w110" data-booking="${booking.id}" data-field="rating" placeholder="Rating" />
        <input class="input flex1Min260" data-booking="${booking.id}" data-field="comment" placeholder="Comment (optional)" />
        <button class="btn" data-action="submit-review" data-booking="${booking.id}">Submit</button>
      </div>
    </div>
  `;
}

function renderBookingRow(booking, role) {
  const counterpartyName = role === 'renter' ? booking.owner_name : booking.renter_name;
  const counterpartyLabel = role === 'renter' ? 'Owner' : 'Renter';
  const otherUserId = role === 'renter' ? booking.owner_id : booking.renter_id;
  const reviewHtml = booking.my_review_id
    ? `<div class="sub mt8">Your review: ${booking.my_rating} *${booking.my_comment ? ` - ${booking.my_comment}` : ''}</div>`
    : `<div class="sub mt8">You have not reviewed ${counterpartyName} yet.</div>`;

  return `
    <div class="card section mt14 noShadow bookingRow" data-booking="${booking.id}">
      <div class="flexBetweenTopWrap">
        <div>
          <div class="fw950">${booking.title || `${booking.year} ${booking.make} ${booking.model}`}</div>
          <div class="sub mt6">Car #${booking.car_id} - ${booking.pickup_location}</div>
          <div class="sub mt6">${booking.start_date} to ${booking.end_date}</div>
        </div>
        <div class="pill">${booking.status}</div>
      </div>
      <div class="mt10">
        <div class="sub"><strong>${counterpartyLabel}:</strong> ${counterpartyName}</div>
        <div class="sub mt6"><strong>Total:</strong> ${money(booking.total_cents)}</div>
      </div>
      <div class="row mt12">
        <a class="btnOutline btnLink" href="/messages.html?carId=${booking.car_id}&other=${otherUserId}">Message ${counterpartyLabel.toLowerCase()}</a>
        ${role === 'renter' && booking.status === 'pending' ? `<button class="btn" data-action="pay-booking" data-booking="${booking.id}">Pay ${money(booking.total_cents)}</button>` : ''}
        ${booking.status === 'cancelled' ? '' : `<button class="btnDanger" data-action="cancel-booking" data-booking="${booking.id}">Cancel booking</button>`}
      </div>
      ${reviewHtml}
      ${booking.my_review_id ? '' : renderReviewForm(booking)}
    </div>
  `;
}

function renderSection(title, bookings, role) {
  if (!bookings || !bookings.length) {
    return `<div class="card section mt14"><div class="fw950">${title}</div><div class="sub mt6">No bookings found.</div></div>`;
  }
  return `
    <div class="card section mt14">
      <div class="fw950">${title}</div>
      <div class="sub mt6">${bookings.length} booking${bookings.length === 1 ? '' : 's'}.</div>
    </div>
    ${bookings.map((b) => renderBookingRow(b, role)).join('')}
  `;
}

// =============================================
// LOAD HISTORY
// =============================================

async function loadHistory() {
  const user = await apiGet('/api/auth/me');
  if (!user.ok) {
    mePill.textContent = 'Not logged in';
    historyContainer.innerHTML = '<div class="sub mt14">Login to see your booking history.</div>';
    return;
  }
  mePill.textContent = `Logged in: ${user.user.display_name}`;

  const r = await apiGet('/api/bookings/history');
  if (!r.ok) {
    showToast('History failed', r.error || 'Try again');
    return;
  }

  historyContainer.innerHTML = `
    ${renderSection('Renter history', r.renterBookings, 'renter')}
    ${renderSection('Owner history', r.ownerBookings, 'owner')}
  `;
}

// =============================================
// EVENTS
// =============================================

historyContainer.addEventListener('click', async (event) => {
  const payButton = event.target.closest('button[data-action="pay-booking"]');
  if (payButton) {
    const bookingId = Number(payButton.dataset.booking);
    const r = await apiPost(`/api/bookings/${bookingId}/pay`, {});
    if (!r.ok) {
      showToast('Payment failed', r.error || 'Try again');
      return;
    }

    showToast('Payment successful', `Booking #${bookingId} confirmed`);
    await loadHistory();
    return;
  }

  const cancelButton = event.target.closest('button[data-action="cancel-booking"]');
  if (cancelButton) {
    const bookingId = Number(cancelButton.dataset.booking);
    const r = await apiPost(`/api/bookings/${bookingId}/cancel`, {});
    if (!r.ok) {
      showToast('Cancel failed', r.error || 'Try again');
      return;
    }

    showToast('Booking cancelled', `Booking #${bookingId}`);
    await loadHistory();
    return;
  }

  const button = event.target.closest('button[data-action="submit-review"]');
  if (!button) return;

  const bookingId = Number(button.dataset.booking);
  const row = document.querySelector(`.bookingRow[data-booking="${bookingId}"]`);
  if (!row) return;

  const ratingEl = row.querySelector(`[data-booking="${bookingId}"][data-field="rating"]`);
  const commentEl = row.querySelector(`[data-booking="${bookingId}"][data-field="comment"]`);
  const rating = Number(ratingEl?.value);
  const comment = commentEl?.value;

  const r = await apiPost(`/api/bookings/${bookingId}/review`, { rating, comment });
  if (!r.ok) {
    showToast('Review failed', r.error || 'Try again');
    return;
  }

  showToast('Review saved', 'Thank you for your feedback.');
  await loadHistory();
});

loadHistory();
</script>
</body>
</html>
