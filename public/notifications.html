<!doctype html>
<html>
<head><meta charset="utf-8"/><title>Notifications</title><link rel="stylesheet" href="/style.css"/></head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <a class="brand" href="/"><span class="logoDot"></span>DriveShare</a>
      <div class="navLinks">
        <a href="/renter.html">Search</a>
        <a href="/owner.html">Owner</a>
        <a href="/messages.html">Messages</a>
        <a href="/history.html">History</a>
      </div>
    </div>
  </div>

  <main class="wrap">
    <div class="card section">
      <div class="flexBetweenTopWrap">
        <div>
          <h1 class="pageTitle">Notifications</h1>
          <div class="sub">Watch updates, booking updates, payments, and messages.</div>
        </div>
        <div class="row">
          <button class="btnOutline" id="loadBtn">Load</button>
          <button class="btnOutline" id="markAllBtn">Mark all read</button>
        </div>
      </div>

      <div id="list" class="gridCars mt14"></div>
    </div>
  </main>

<script type="module">
import { apiGet, apiPost, showToast } from "./ui.js";

const list = document.getElementById('list');

function parseMessageNotification(text){
  const parts = {};
  String(text || '').split('|').forEach((part) => {
    const [key, ...rest] = part.split(':');
    if (!key) return;
    parts[key] = rest.join(':');
  });
  return parts;
}

async function buildMessageCard(n){
  const parts = parseMessageNotification(n.text);
  const carId = parts.car_id;
  const fromUserId = parts.from_user;
  const senderName = parts.sender_name || `User #${fromUserId}`;
  const carName = parts.car_name || `Car #${carId}`;

  const carRes = await apiGet(`/api/cars/${carId}`);
  const ownerId = carRes.ok ? carRes.car.owner_id : null;
  const senderRole = Number(fromUserId) === Number(ownerId) ? 'Owner' : 'Buyer';

  return `
    <div class="section notificationMessageCard">
      <div class="flexBetweenTopWrap">
        <div class="fw950">New message</div>
        <div class="pill">${n.is_read ? 'Read' : 'New'}</div>
      </div>
      <div class="sub mt6">${n.created_at}</div>
      <div class="mt10">
        From <strong>${senderName}</strong>
        <span class="conversationRole">${senderRole}</span>
      </div>
      <div class="sub mt6">Conversation: <strong>${carName}</strong></div>
      <div class="row mt12">
        <button type="button" class="btn msgBtn" data-car-id="${carId}" data-user-id="${fromUserId}">Open inbox</button>
        <button type="button" class="btnOutline readBtn" data-id="${n.id}">Mark read</button>
      </div>
    </div>
  `;
}

async function render(items){
  list.innerHTML = '';

  if(!items.length){
    list.innerHTML = '<div class="sub">No notifications yet.</div>';
    return;
  }

  for (const n of items) {
    const div = document.createElement('div');
    div.className = 'card';

    if(n.type === 'message' && n.text.includes('car_id:') && n.text.includes('from_user:')) {
      div.innerHTML = await buildMessageCard(n);
    } else {
      div.innerHTML = `
        <div class="section">
          <div class="flexBetweenTopWrap">
            <div class="fw950">${n.type.toUpperCase()}</div>
            <div class="pill">${n.is_read ? 'Read' : 'New'}</div>
          </div>
          <div class="sub mt6">${n.created_at}</div>
          <div class="mt10">${n.text}</div>
          <div class="row mt12">
            <button class="btnOutline readBtn" data-id="${n.id}">Mark read</button>
          </div>
        </div>
      `;
    }

    list.appendChild(div);
  }
}

async function load(){
  const r = await apiGet('/api/notifications');
  if(r.ok) {
    await render(r.notifications);
  } else {
    showToast('Notifications failed', r.error || 'Try again');
  }
}

document.getElementById('loadBtn').addEventListener('click', load);

list.addEventListener('click', async (e) => {
  const msgBtn = e.target.closest('button.msgBtn');
  if(msgBtn) {
    const carId = msgBtn.dataset.carId;
    const userId = msgBtn.dataset.userId;
    window.location.href = `/messages.html?carId=${carId}&other=${userId}`;
    return;
  }

  const readBtn = e.target.closest('button.readBtn');
  if(readBtn) {
    await apiPost(`/api/notifications/${readBtn.dataset.id}/read`, {});
    await load();
  }
});

document.getElementById('markAllBtn').addEventListener('click', async () => {
  const r = await apiGet('/api/notifications');
  if(!r.ok) return;
  for(const n of r.notifications){
    if(!n.is_read) await apiPost(`/api/notifications/${n.id}/read`, {});
  }
  await load();
});

await load();
</script>
</body>
</html>
