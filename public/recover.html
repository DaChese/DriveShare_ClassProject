<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Password Recovery</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <!-- ============================================= -->
  <!-- TOP NAV                                       -->
  <!-- ============================================= -->
  <div class="topbar">
    <div class="topbarInner">
      <a class="brand" href="/"><span class="logoDot"></span>DriveShare</a>
      <div class="navLinks">
        <a href="/renter.html">Search</a>
        <a href="/owner.html">Owner</a>
        <a href="/notifications.html">Notifications</a>
      </div>
    </div>
  </div>

  <main class="wrap">
    <!-- ============================================= -->
    <!-- RECOVERY FORM                                 -->
    <!-- ============================================= -->
    <div class="card section">
      <h1 class="pageTitle">Password recovery</h1>
      <div class="sub">Answer the 3 questions in order, then reset your password.</div>

      <div class="row mt14">
        <input class="input min260" id="email" placeholder="email" />
        <input class="input" id="ans1" placeholder="Answer 1" />
        <input class="input" id="ans2" placeholder="Answer 2" />
        <input class="input" id="ans3" placeholder="Answer 3" />
        <input class="input" id="newpw" placeholder="new password" type="password" />
        <button class="btn" id="go">Verify and reset</button>
      </div>
    </div>
  </main>

  <script type="module">
    /*
     * Author:
     * Created on: January 11, 2026
     * Last updated: April 12, 2026
     * Purpose: Sends password recovery answers and the new password.
     */

    // =============================================
    // IMPORTS
    // =============================================

    import { apiPost, showToast } from "./ui.js";

    // =============================================
    // EVENTS
    // =============================================

    document.getElementById('go').addEventListener('click', async () => {
      const payload = { email: email.value, answers: {1: ans1.value, 2: ans2.value, 3: ans3.value}, newPassword: newpw.value };
      const r = await apiPost('/api/auth/recover', payload);
      if(r.ok){
        showToast('Password updated', 'You can login now');
      } else {
        showToast('Recovery failed', r.error || 'Check answers');
      }
    });
  </script>
</body>
</html>
